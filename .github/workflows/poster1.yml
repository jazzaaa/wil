name: Render LGP Poster

on:
  workflow_dispatch:

jobs:
  poster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Render poster
        run: python poster.py

      - name: Upload Poster
        uses: actions/upload-artifact@v4
        with:
          name: LGP_Poster_Output
          path: LGP_Poster_Output.png
