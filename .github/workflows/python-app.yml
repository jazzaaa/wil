name: Render LGP Reel

on:
  workflow_dispatch:
  push:
    paths:
      - "photos/**"
      - "texts.json"
      - "render.py"
      - "requirements.txt"
      - ".github/workflows/render.yml"

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render video
        run: python render.py

      - name: Upload MP4
        uses: actions/upload-artifact@v4
        with:
          name: LGP_Reel_Output
          path: LGP_Reel_Output.mp4
